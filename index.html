<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <p>Tem certeza de que deseja excluir esta tarefa?</p>
            <button id="confirmDelete">Sim</button>
            <button id="cancelDelete">Cancelar</button>
        </div>
    </div>
    <div class="container">
        <h1>To-Do List</h1>
        <p>Bem-vindo à nossa To-Do List! Adicione suas tarefas abaixo:</p>
        <div class="input-container">
            
            <input type="text" id="taskInput" placeholder="Adicione uma tarefa...">
            <button id="addButton">Adicionar</button>
        </div>
        <ul id="taskList">
            <!-- Lista de tarefas será inserida aqui -->
        </ul>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
